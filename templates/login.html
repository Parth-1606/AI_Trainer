{% extends "base.html" %}

{% block title %}Login - AI Trainer Pro{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 450px;
        margin: 4rem auto;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    label {
        display: block;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        font-weight: 500;
    }
    input {
        width: 100%;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    input:focus {
        outline: none;
        border-color: var(--accent-cyan);
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
    }
    .submit-btn {
        width: 100%;
        margin-top: 1rem;
        padding: 1.2rem;
        font-size: 1.1rem;
        letter-spacing: 1px;
    }
    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        color: var(--text-secondary);
    }
    .auth-footer a {
        color: var(--accent-pink);
        text-decoration: none;
        font-weight: 600;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }
    .auth-header h1 {
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
    }
    .auth-header p {
        color: var(--text-secondary);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your trainer</p>
    </div>
    
    <div class="glass-card">
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary submit-btn">INITIALIZE SYSTEM</button>
        </form>
    </div>
    
    <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('signup') }}">Create one now</a>
    </div>
</div>
{% endblock %}
