{% extends "base.html" %}

{% block title %}AI Vision Trainer - FitLynx AI{% endblock %}

{% block extra_css %}
<style>
    .container {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
    }
    .iframe-wrapper {
        width: 100%;
        height: calc(100vh - 80px);
        overflow: hidden;
    }

        height: 100%;
        border: none;
    }

{% endblock %}

{% block content %}
<div class="iframe-wrapper">
    <iframe src="/trainer_ui" allow="camera; microphone" title="React Trainer UI"></iframe>
</div>
{% endblock %}
