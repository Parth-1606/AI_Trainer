<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FitLynx AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f17;
            color: white;
            min-height: 100vh;
            display: flex;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 0;
        }
        
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            pointer-events: none;
        }
        .blob-1 { width: 600px; height: 600px; background: #7c3aed; top: -200px; right: -150px; animation: drift1 10s ease-in-out infinite; }
        .blob-2 { width: 500px; height: 500px; background: #00f2ff; bottom: -150px; left: -100px; animation: drift2 12s ease-in-out infinite; }
        .blob-3 { width: 350px; height: 350px; background: #00e676; top: 30%; right: 30%; animation: drift3 14s ease-in-out infinite; }
        
        @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,40px) scale(1.1); } }
        @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-50px) scale(1.05); } }
        @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px,30px) scale(0.95); } }
        
        .signup-page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 24px;
            margin: auto;
            animation: pageIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes pageIn { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #1a1040, #0d2f3a);
            border: 1.5px solid rgba(124,58,237,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            color: #7c3aed;
            box-shadow: 0 0 30px rgba(124,58,237,0.1);
        }
        .brand h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .brand h1 .join { color: #9ca3af; font-weight: 400; }
        .brand h1 .name { color: #7c3aed; }
        .brand p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 6px;
        }
        
        .flash {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }
        .flash-success { background: rgba(0,230,118,0.1); color: #00e676; border: 1px solid rgba(0,230,118,0.25); }
        .flash-error { background: rgba(255,77,77,0.08); color: #ff6b6b; border: 1px solid rgba(255,77,77,0.2); }
        
        .card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 32px 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .field input::placeholder { color: rgba(255,255,255,0.18); }
        .field input:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(124,58,237,0.04);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.1), 0 0 20px rgba(124,58,237,0.05);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-row .field { margin-bottom: 20px; }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #7c3aed, #00f2ff);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 4px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(124,58,237,0.35);
        }
        .submit-btn:hover::before { left: 100%; }
        .submit-btn:active { transform: translateY(-1px); }
        
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .footer a {
            color: #00f2ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .footer a:hover { color: #fff; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    
    <div class="signup-page">
        <div class="brand">
            <div class="brand-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                    <path d="M6 8H5a4 4 0 0 0 0 8h1"></path>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                </svg>
            </div>
            <h1><span class="join">Join </span><span class="name">FitLynx</span></h1>
            <p>Start your AI fitness journey</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ 'flash-success' if category == 'success' else 'flash-error' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="card">
            <form action="{{ url_for('signup') }}" method="POST">
                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="field">
                        <label>Confirm</label>
                        <input type="password" name="confirm_password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Create Account →</button>
            </form>
        </div>
        
        <div class="footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>
</body>
</html>
