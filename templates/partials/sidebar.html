<!-- Reusable Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo desktop-only">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
            <path d="M6 8H5a4 4 0 0 0 0 8h1"></path>
            <line x1="2" y1="12" x2="22" y2="12"></line>
        </svg>
    </div>
    
    <div class="mobile-header" style="width: 100%; justify-content: space-between; align-items: center;">
        <div style="font-size: 1.2rem; font-weight: 800; color: white;">Fit<span style="color:var(--accent-teal);">Lynx</span></div>
        <button id="hamburgerBtn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">☰</button>
    </div>
    
    <div class="sidebar-links" id="sidebarLinks">
        <a href="{{ url_for('dashboard') }}" class="sidebar-item {{ 'active' if active_page == 'dashboard' }}">
            <div class="sidebar-icon">📊</div>
            <span class="sidebar-text">Dashboard</span>
        </a>
        <a href="{{ url_for('calendar') }}" class="sidebar-item {{ 'active' if active_page == 'workouts' }}">
            <div class="sidebar-icon">💪</div>
            <span class="sidebar-text">Workouts</span>
        </a>
        <a href="{{ url_for('vitals') }}" class="sidebar-item {{ 'active' if active_page == 'vitals' }}">
            <div class="sidebar-icon">❤️</div>
            <span class="sidebar-text">Vitals</span>
        </a>
        <a href="{{ url_for('community') }}" class="sidebar-item {{ 'active' if active_page == 'community' }}">
            <div class="sidebar-icon">👥</div>
            <span class="sidebar-text">Community</span>
        </a>
        <a href="{{ url_for('nutrition') }}" class="sidebar-item {{ 'active' if active_page == 'nutrition' }}">
            <div class="sidebar-icon">🥗</div>
            <span class="sidebar-text">Nutrition</span>
        </a>
        <a href="{{ url_for('settings') }}" class="sidebar-item {{ 'active' if active_page == 'settings' }}">
            <div class="sidebar-icon">⚙️</div>
            <span class="sidebar-text">Settings</span>
        </a>
        <a href="{{ url_for('logout') }}" class="sidebar-item" style="margin-top: auto; color: #ff4d4d;">
            <div class="sidebar-icon">🚪</div>
            <span class="sidebar-text">Logout</span>
        </a>
    </div>
    
    <!-- Profile Avatar with Popup -->
    <div style="position: relative; margin-top: 10px;">
        <div class="profile-avatar" id="profileBtn"
             style="cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;"
             onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 0 15px rgba(0,242,255,0.4)'"
             onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'"
             onclick="document.getElementById('profilePopup').classList.toggle('profile-popup-show')">
            {{ session.username[0]|upper }}
        </div>
        
        <!-- Popup Card -->
        <div id="profilePopup" class="profile-popup" style="
            position: absolute;
            bottom: 0;
            left: 55px;
            transform: scale(0.9);
            transform-origin: bottom left;
            min-width: 220px;
            background: #1e2330;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 0;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        ">
            <!-- User Info Header -->
            <div style="padding: 20px 18px 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <div style="
                    width: 55px; height: 55px; border-radius: 50%;
                    background: linear-gradient(135deg, #00f2ff, #00e676);
                    display: flex; align-items: center; justify-content: center;
                    font-size: 1.5rem; font-weight: 800; color: #000;
                    margin: 0 auto 10px;
                ">{{ session.username[0]|upper }}</div>
                <div style="font-weight: 700; font-size: 1rem; color: white;">{{ session.username }}</div>
                <div style="font-size: 0.75rem; color: #8b949e; margin-top: 3px;">
                    <span style="display:inline-block; width:7px; height:7px; background:#00e676; border-radius:50%; vertical-align:middle; margin-right:4px;"></span>
                    Online
                </div>
            </div>
            
            <!-- Quick Links -->
            <div style="padding: 8px;">
                <a href="{{ url_for('settings') }}" style="
                    display: flex; align-items: center; gap: 10px;
                    padding: 10px 12px; border-radius: 10px;
                    color: #c9d1d9; text-decoration: none; font-size: 0.85rem;
                    transition: background 0.2s;
                " onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">
                    <span>👤</span> Profile Settings
                </a>
                <a href="{{ url_for('vitals') }}" style="
                    display: flex; align-items: center; gap: 10px;
                    padding: 10px 12px; border-radius: 10px;
                    color: #c9d1d9; text-decoration: none; font-size: 0.85rem;
                    transition: background 0.2s;
                " onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">
                    <span>❤️</span> My Vitals
                </a>
                <a href="{{ url_for('calendar') }}" style="
                    display: flex; align-items: center; gap: 10px;
                    padding: 10px 12px; border-radius: 10px;
                    color: #c9d1d9; text-decoration: none; font-size: 0.85rem;
                    transition: background 0.2s;
                " onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">
                    <span>📅</span> Workout History
                </a>
            </div>
            
            <!-- Logout -->
            <div style="padding: 0 8px 8px;">
                <a href="{{ url_for('logout') }}" style="
                    display: flex; align-items: center; gap: 10px;
                    padding: 10px 12px; border-radius: 10px;
                    color: #ff4d4d; text-decoration: none; font-size: 0.85rem; font-weight: 500;
                    border-top: 1px solid rgba(255,255,255,0.05);
                    transition: background 0.2s;
                " onmouseover="this.style.background='rgba(255,77,77,0.1)'" onmouseout="this.style.background='transparent'">
                    <span>🚪</span> Sign Out
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .profile-popup-show {
        opacity: 1 !important;
        pointer-events: auto !important;
        transform: scale(1) !important;
    }
</style>
<script>
    document.addEventListener('click', function(e) {
        var popup = document.getElementById('profilePopup');
        var btn = document.getElementById('profileBtn');
        if (popup && btn && !popup.contains(e.target) && !btn.contains(e.target)) {
            popup.classList.remove('profile-popup-show');
        }
    });

    // Mobile Hamburger Toggle
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var sidebarLinks = document.getElementById('sidebarLinks');
    if (hamburgerBtn && sidebarLinks) {
        hamburgerBtn.addEventListener('click', function() {
            sidebarLinks.classList.toggle('show');
        });
    }
</script>
