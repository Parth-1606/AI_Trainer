<!-- Shared CSS for sidebar pages -->
<style>
    .navbar { display: none !important; }
    .container { max-width: 100%; padding: 0; margin: 0; }
    
    :root {
        --app-bg: #11151c;
        --card-bg: #1e2330;
        --sidebar-bg: #161b22;
        --accent-teal: #00f2ff;
        --accent-green: #00e676;
        --accent-orange: #ff9800;
        --text-muted: #8b949e;
        --border-color: rgba(255, 255, 255, 0.05);
    }
    
    body {
        background-color: var(--app-bg);
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
    }
    
    .layout-wrapper {
        display: flex;
        height: 100vh;
        width: 100%;
    }
    
    .sidebar {
        width: 110px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 0;
        gap: 1.5rem;
    }
    
    .sidebar-logo {
        margin-bottom: 2rem;
        color: var(--accent-teal);
    }
    
    .sidebar-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.75rem;
        gap: 6px;
        padding: 12px 8px;
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        width: 90px;
        text-align: center;
        cursor: pointer;
    }
    
    .sidebar-text {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        display: block;
        white-space: nowrap;
    }
    
    .sidebar-item.active {
        background-color: rgba(0, 242, 255, 0.1);
        color: var(--accent-teal);
        border-left: 3px solid var(--accent-teal);
        box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.05);
    }
    
    .sidebar-item.active .sidebar-text {
        color: var(--accent-teal);
    }
    
    .sidebar-item:hover:not(.active) {
        color: white;
        background-color: rgba(255, 255, 255, 0.05);
        transform: translateY(-2px);
    }
    
    .sidebar-icon {
        font-size: 1.4rem;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .sidebar-item:hover .sidebar-icon {
        transform: scale(1.15);
    }
    
    .profile-avatar {
        margin-top: auto;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: var(--accent-teal);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #000;
        font-weight: bold;
    }
    
    .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 20px 40px;
    }
    
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }
    
    .top-nav {
        display: flex;
        gap: 20px;
    }
    
    .top-nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        padding-bottom: 5px;
    }
    
    .top-nav a.active {
        color: var(--accent-teal);
        border-bottom: 2px solid var(--accent-teal);
    }
    
    .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .profile-header {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .profile-status {
        width: 8px;
        height: 8px;
        background-color: var(--accent-green);
        border-radius: 50%;
        display: inline-block;
    }
    
    .panel {
        background-color: var(--card-bg);
        border-radius: 16px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-color);
        margin-bottom: 20px;
    }
    
    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }
    
    .panel-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
    }
    
    .mobile-header { display: none; }
    .sidebar-links { display: contents; }
    
    @media (max-width: 768px) {
        body {
            height: auto;
            overflow-y: auto;
        }
        .layout-wrapper {
            flex-direction: column;
            height: auto;
            min-height: 100vh;
        }
        .top-nav {
            display: none !important;
        }
        .desktop-only {
            display: none !important;
        }
        .mobile-header {
            display: flex;
        }
        .sidebar {
            width: 100%;
            height: auto;
            flex-direction: column;
            padding: 15px;
            border-right: none;
            border-bottom: 1px solid var(--border-color);
            align-items: stretch;
            gap: 0;
        }
        .sidebar-links {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .sidebar-links.show {
            display: flex;
        }
        .sidebar-logo, .profile-avatar {
            display: none;
        }
        .sidebar-item {
            width: 100%;
            padding: 12px 15px;
            flex-direction: row;
            justify-content: flex-start;
            white-space: nowrap;
        }
        .main-panel {
            padding: 15px;
            overflow-y: visible;
        }
        .topbar {
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
            margin-bottom: 15px;
        }
    }
</style>
