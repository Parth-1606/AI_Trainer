<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Open Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        a {
            display: inline-block;
            padding: 15px 30px;
            background: #ff6b35;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }
        a:hover {
            background: #e55a2b;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
        }
    </style>
    <script>
      
        window.addEventListener('load', function() {
            fetch('http://localhost:5000')
                .then(function(response) {
                    if (response.ok) {
                        document.getElementById('status').textContent = '✓ Server is running!';
                        document.getElementById('status').style.color = '#4CAF50';
                    }
                })
                .catch(function(error) {
                    document.getElementById('status').textContent = '⚠ Server not responding. Make sure Flask server is running!';
                    document.getElementById('status').style.color = '#f44336';
                });
        });
    </script>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Fitness Trainer</h1>
        <p>Click the button below to open the login page</p>
        <a href="http://localhost:5000" target="_blank">Open Login Page</a>
        <p id="status" style="margin-top: 20px; font-size: 12px; color: #999;">
            Checking server status...
        </p>
        <p style="margin-top: 10px; font-size: 12px; color: #999;">
            Direct link: <a href="http://localhost:5000" style="color: #667eea;">http://localhost:5000</a>
        </p>
    </div>
</body>
</html>
